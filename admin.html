<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

  import {
    initializeFirestore,
    getFirestore,
    persistentLocalCache,
    persistentMultipleTabManager,
    collection,
    getDocs,
    query,
    orderBy,
    doc,
    writeBatch
  } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD_GjkTox5tum9o4AupO0LeWzjTocJg8RI",
    authDomain: "dettyverse.firebaseapp.com",
    projectId: "dettyverse",
    storageBucket: "cubeology",
    messagingSenderId: "1036459652488",
    appId: "1:1036459652488:web:f4284cbc49c8074bc9b63d",
    measurementId: "G-KPSCEYNZWX"
  };

  // ============================================================
  // READINESS PROMISE
  // ------------------------------------------------------------
  // <script type="module"> is always deferred by the browser — it
  // only runs after the ENTIRE document has finished parsing. The
  // classic <script> further down (which compiles and mounts the
  // React app) runs immediately as the parser reaches it, which is
  // BEFORE this module script gets a turn. That means the app can
  // mount and call fetchWaitlist() before Firebase has actually
  // finished initializing, seeing __chrgeFirebaseReady as not-yet-
  // true and failing with a "firebase-unavailable" error even
  // though nothing is actually wrong with the config or rules.
  //
  // Fixing this properly means the app code should never just
  // check a boolean once — it should await a promise that resolves
  // whenever init actually finishes, however long that takes.
  // ============================================================
  window.__chrgeFirebaseReadyPromise = (async () => {
    try {
      const app = initializeApp(firebaseConfig);
      console.log("🔥 Firebase Project:", firebaseConfig.projectId);

      let db;
      try {
        db = initializeFirestore(
          app,
          {
            localCache: persistentLocalCache({
              tabManager: persistentMultipleTabManager()
            })
          },
          "chrge"
        );
        console.log("📦 Firestore Database: chrge");
        console.log("✅ Persistent cache enabled");
      } catch (err) {
        console.warn("[FIRESTORE] Persistent cache unavailable. Falling back.", err);
        db = getFirestore(app, "chrge");
      }

      window.__chrgeFirestore = { db, collection, getDocs, query, orderBy, doc, writeBatch };
      window.__chrgeFirebaseReady = true;
      console.log("✅ Firebase Admin Dashboard Ready");
      return true;
    } catch (e) {
      console.error("❌ Firebase initialization failed:", e);
      window.__chrgeFirebaseReady = false;
      window.__chrgeFirebaseInitError = e;
      return false;
    }
  })();
</script>

// ============================================================
// WAIT FOR FIREBASE — polling, not a one-time promise check
// ------------------------------------------------------------
// The previous fix checked "does window.__chrgeFirebaseReadyPromise
// exist" before awaiting it — but if the deferred <script type=
// "module"> hasn't even STARTED executing yet (not just "still
// running"), that variable doesn't exist at all, so the check
// silently skipped waiting. Polling sidesteps this entirely: it
// doesn't matter when the module script starts or finishes, this
// just keeps checking every 50ms until the flag flips one way or
// the other, or a generous timeout elapses.
// ============================================================
function waitForFirebase(timeoutMs = 8000) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    (function check() {
      if (window.__chrgeFirebaseReady && window.__chrgeFirestore) {
        resolve(true);
        return;
      }
      if (window.__chrgeFirebaseReady === false) {
        reject(window.__chrgeFirebaseInitError || new Error('firebase-init-failed'));
        return;
      }
      if (Date.now() - start > timeoutMs) {
        reject(new Error('firebase-init-timeout: Firebase never signaled ready or failed within 8s'));
        return;
      }
      setTimeout(check, 50);
    })();
  });
}

async function fetchWaitlist() {
  await waitForFirebase();
  const { db, collection, getDocs, query, orderBy } = window.__chrgeFirestore;
  const q = query(collection(db, 'waitlist'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// ============================================================
// MARK AS RSVP'D
// ------------------------------------------------------------
// Sets rsvped:true on each given doc ID via a single batched
// write (not one write per doc — cheaper and atomic). This does
// NOT delete anything; it just flips a flag the dashboard uses
// to hide entries from the default view, so a growing waitlist
// doesn't stay cluttered with people already followed up with.
// ============================================================
async function markAsRsvped(ids) {
  await waitForFirebase();
  if (!ids || ids.length === 0) return;
  const { db, doc, writeBatch } = window.__chrgeFirestore;
  const batch = writeBatch(db);
  ids.forEach(id => {
    batch.update(doc(db, 'waitlist', id), { rsvped: true, rsvpedAt: new Date() });
  });
  await batch.commit();
}

const fmtDate = (ts) => {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch {
    return '—';
  }
};

const isoToFlagEmoji = (iso) => {
  if (!iso || typeof iso !== 'string' || iso.length !== 2) return '';
  return iso.toUpperCase().replace(/./g, ch => String.fromCodePoint(127397 + ch.charCodeAt(0)));
};

function StatCard({ label, value, icon: IconComp }) {
  return (
    <div style={{ background: '#131311', border: '1px solid rgba(244,244,242,0.08)', borderRadius: '14px', padding: '1.4rem 1.6rem', display: 'flex', alignItems: 'center', gap: '1rem', flex: 1 }}>

      <div>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '1.5rem', color: '#F4F4F2', lineHeight: 1 }}>{value}</div>
        <div style={{ color: '#9a9a96', fontSize: '0.8rem', marginTop: '0.2rem' }}>{label}</div>
      </div>
    </div>
  );
}

function ChrgePlusAdmin() {
  const [entries, setEntries] = useState([]);
  const [status, setStatus] = useState('idle');
  const [errorDetail, setErrorDetail] = useState('');
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [showRsvped, setShowRsvped] = useState(false);
  const [exportModalOpen, setExportModalOpen] = useState(false);
  const [marking, setMarking] = useState(false);

  const load = useCallback(async () => {
    setStatus('loading');
    setErrorDetail('');
    try {
      const data = await fetchWaitlist();
      setEntries(data);
      setStatus('success');
    } catch (e) {
      console.error('fetchWaitlist failed:', e);
      setErrorDetail((e && (e.code || e.message)) ? `${e.code || ''} ${e.message || ''}`.trim() : String(e));
      setStatus('error');
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const filtered = entries.filter(e => {
    if (!showRsvped && e.rsvped) return false;
    if (filter !== 'all' && e.role !== filter) return false;
    if (search.trim()) {
      const s = search.toLowerCase();
      return (e.name || '').toLowerCase().includes(s) ||
             (e.email || '').toLowerCase().includes(s) ||
             (e.city || '').toLowerCase().includes(s) ||
             (e.phone || '').toLowerCase().includes(s) ||
             (e.venueName || '').toLowerCase().includes(s);
    }
    return true;
  });

  const userCount = entries.filter(e => e.role === 'user').length;
  const venueCount = entries.filter(e => e.role === 'venue').length;
  const rsvpedCount = entries.filter(e => e.rsvped).length;

  const buildCsv = (rows) => {
    const out = [['Name', 'Email', 'Phone', 'Role', 'City', 'Venue', 'RSVP\'d', 'Joined']];
    rows.forEach(e => {
      out.push([e.name || '', e.email || '', e.phone || '', e.role || '', e.city || '', e.venueName || '', e.rsvped ? 'Yes' : 'No', fmtDate(e.createdAt)]);
    });
    const csv = out.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'chrge-plus-waitlist.csv';
    a.click();
    URL.revokeObjectURL(url);
  };

  const exportOnly = () => {
    buildCsv(filtered);
    setExportModalOpen(false);
  };

  const exportAndMark = async () => {
    setMarking(true);
    try {
      const ids = filtered.map(e => e.id);
      buildCsv(filtered.map(e => ({ ...e, rsvped: true })));
      await markAsRsvped(ids);
      setEntries(prev => prev.map(e => ids.includes(e.id) ? { ...e, rsvped: true } : e));
    } catch (e) {
      console.error('markAsRsvped failed:', e);
      alert('Exported the CSV, but marking as RSVP\'d failed: ' + (e.message || e) + '\n\nYour Firestore rules may not allow updates yet.');
    } finally {
      setMarking(false);
      setExportModalOpen(false);
    }
  };

  return (
    <div style={{ background: '#0A0A0A', minHeight: '100vh', fontFamily: "'Inter', sans-serif", color: '#F4F4F2', padding: '2.5rem 1.5rem' }}>
      <div style={{ maxWidth: '1100px', margin: '0 auto' }}>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <ChrgeLogo style={{ width: '110px', marginBottom: '0.6rem' }} />
            <div style={{ color: '#9a9a96', fontSize: '0.85rem' }}>Waitlist dashboard</div>
          </div>
          <div style={{ display: 'flex', gap: '0.6rem' }}>
            <button onClick={load} disabled={status === 'loading'} style={{
              display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.7rem 1.1rem', borderRadius: '9px',
              border: '1px solid rgba(244,244,242,0.14)', background: 'transparent', color: '#F4F4F2',
              fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.85rem',
              cursor: status === 'loading' ? 'default' : 'pointer'
            }}>
              <Icon.RefreshCw size={15} style={{ animation: status === 'loading' ? 'spin 1s linear infinite' : 'none' }} />
              Refresh
            </button>
            <button onClick={() => setExportModalOpen(true)} disabled={filtered.length === 0} style={{
              display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.7rem 1.1rem', borderRadius: '9px', border: 'none',
              background: '#C3F60C', color: '#0A0A0A',
              fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '0.85rem',
              cursor: filtered.length === 0 ? 'default' : 'pointer',
              opacity: filtered.length === 0 ? 0.5 : 1
            }}>
              <Icon.Download size={15} />
              Export CSV
            </button>
          </div>
        </div>

        {status === 'error' && (
          <div style={{ display: 'flex', gap: '0.8rem', alignItems: 'flex-start', background: 'rgba(255,138,138,0.08)', border: '1px solid rgba(255,138,138,0.3)', borderRadius: '12px', padding: '1.2rem 1.4rem', marginBottom: '1.6rem' }}>
            <Icon.AlertCircle size={19} color="#ff8a8a" style={{ flexShrink: 0, marginTop: '2px' }} />
            <div>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.9rem', marginBottom: '0.3rem' }}>Couldn't load the waitlist</div>
              {errorDetail && (
                <div style={{ fontFamily: 'monospace', fontSize: '0.78rem', color: '#ff8a8a', background: 'rgba(0,0,0,0.25)', padding: '0.5rem 0.7rem', borderRadius: '6px', marginBottom: '0.6rem', wordBreak: 'break-word' }}>
                  {errorDetail}
                </div>
              )}
              <div style={{ color: '#c9c9c5', fontSize: '0.83rem', lineHeight: 1.5 }}>
                Either the Firebase config near the top of this file is still set to placeholder values, or your Firestore rules don't allow reads yet. See the setup notes in the HTML comments — you'll likely need to temporarily allow reads on the <code>waitlist</code> collection, or view signups directly in the Firebase Console instead.
              </div>
            </div>
          </div>
        )}

        <div style={{ display: 'flex', gap: '1rem', marginBottom: '1.6rem', flexWrap: 'wrap' }}>
          <StatCard label="Total signups" value={entries.length} icon={Icon.Users} />
          <StatCard label="Users" value={userCount} icon={Icon.Users} />
          <StatCard label="Venues" value={venueCount} icon={Icon.Store} />
        </div>

        <div style={{ display: 'flex', gap: '0.8rem', marginBottom: '1.2rem', flexWrap: 'wrap' }}>
          <div style={{ position: 'relative', flex: 1, minWidth: '220px' }}>
            <Icon.Search size={15} color="#6b6b68" style={{ position: 'absolute', left: '0.9rem', top: '50%', transform: 'translateY(-50%)' }} />
            <input
              type="text" placeholder="Search name, email, city..." value={search}
              onChange={e => setSearch(e.target.value)}
              style={{ width: '100%', padding: '0.7rem 1rem 0.7rem 2.4rem', borderRadius: '9px', border: '1px solid rgba(244,244,242,0.12)', background: 'rgba(244,244,242,0.03)', color: '#F4F4F2', fontSize: '0.85rem', outline: 'none' }}
            />
          </div>
          <div style={{ display: 'flex', gap: '0.5rem' }}>
            {['all', 'user', 'venue'].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{
                padding: '0.7rem 1.1rem', borderRadius: '9px',
                border: filter === f ? '1px solid #C3F60C' : '1px solid rgba(244,244,242,0.12)',
                background: filter === f ? 'rgba(195,246,12,0.08)' : 'transparent',
                color: filter === f ? '#C3F60C' : '#9a9a96',
                fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.8rem',
                cursor: 'pointer', textTransform: 'capitalize'
              }}>{f}</button>
            ))}
            <button onClick={() => setShowRsvped(v => !v)} style={{
              padding: '0.7rem 1.1rem', borderRadius: '9px',
              border: showRsvped ? '1px solid #C3F60C' : '1px solid rgba(244,244,242,0.12)',
              background: showRsvped ? 'rgba(195,246,12,0.08)' : 'transparent',
              color: showRsvped ? '#C3F60C' : '#9a9a96',
              fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.8rem',
              cursor: 'pointer', whiteSpace: 'nowrap'
            }}>
              {showRsvped ? '✓ ' : ''}Show RSVP'd ({rsvpedCount})
            </button>
          </div>
        </div>

        {exportModalOpen && (
          <div
            onClick={() => !marking && setExportModalOpen(false)}
            style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100, padding: '1.5rem' }}
          >
            <div onClick={e => e.stopPropagation()} style={{
              background: '#131311', border: '1px solid rgba(244,244,242,0.12)', borderRadius: '14px',
              padding: '1.8rem', maxWidth: '420px', width: '100%'
            }}>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '1.1rem', marginBottom: '0.5rem' }}>
                Export {filtered.length} signup{filtered.length === 1 ? '' : 's'}
              </div>
              <p style={{ color: '#9a9a96', fontSize: '0.85rem', lineHeight: 1.5, marginBottom: '1.4rem' }}>
                Mark these as RSVP'd too? They'll disappear from this dashboard's default view afterward — the data stays safe in Firestore, and you can bring them back anytime with "Show RSVP'd" above.
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.6rem' }}>
                <button onClick={exportAndMark} disabled={marking} style={{
                  padding: '0.85rem', borderRadius: '10px', border: 'none', background: '#C3F60C', color: '#0A0A0A',
                  fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '0.88rem',
                  cursor: marking ? 'default' : 'pointer', opacity: marking ? 0.7 : 1,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem'
                }}>
                  {marking ? <Icon.RefreshCw size={14} style={{ animation: 'spin 1s linear infinite' }} /> : null}
                  {marking ? 'Marking...' : "Export & Mark as RSVP'd"}
                </button>
                <button onClick={exportOnly} disabled={marking} style={{
                  padding: '0.85rem', borderRadius: '10px', border: '1px solid rgba(244,244,242,0.14)', background: 'transparent', color: '#F4F4F2',
                  fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.88rem',
                  cursor: marking ? 'default' : 'pointer'
                }}>
                  Export only, don't mark
                </button>
                <button onClick={() => setExportModalOpen(false)} disabled={marking} style={{
                  padding: '0.7rem', borderRadius: '10px', border: 'none', background: 'transparent', color: '#6b6b68',
                  fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.82rem',
                  cursor: marking ? 'default' : 'pointer'
                }}>
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}

        <div style={{ background: '#131311', border: '1px solid rgba(244,244,242,0.08)', borderRadius: '14px', overflow: 'hidden' }}>
          {status === 'loading' && entries.length === 0 ? (
            <div style={{ padding: '3rem', textAlign: 'center', color: '#6b6b68' }}>Loading signups…</div>
          ) : filtered.length === 0 && status !== 'error' ? (
            <div style={{ padding: '3rem', textAlign: 'center', color: '#6b6b68' }}>No signups {search || filter !== 'all' ? 'match this filter' : 'yet'}.</div>
          ) : status === 'error' ? null : (
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>City</th><th>Venue</th><th>Joined</th></tr>
                </thead>
                <tbody>
                  {filtered.map(e => (
                    <tr key={e.id}>
                      <td style={{ fontWeight: 500 }}>{e.name || '—'}</td>
                      <td style={{ color: '#c9c9c5' }}>{e.email}</td>
                      <td style={{ color: '#9a9a96' }}>
                        {e.phone ? (
                          <span style={{ display: 'inline-flex', alignItems: 'center', gap: '0.35rem' }}>
                            {e.phoneCountry && <span>{isoToFlagEmoji(e.phoneCountry)}</span>}
                            <span>{e.phone}</span>
                          </span>
                        ) : '—'}
                      </td>
                      <td>
                        <span style={{
                          padding: '0.2rem 0.6rem', borderRadius: '999px', fontSize: '0.72rem',
                          fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600,
                          background: e.role === 'venue' ? 'rgba(195,246,12,0.12)' : 'rgba(244,244,242,0.08)',
                          color: e.role === 'venue' ? '#C3F60C' : '#c9c9c5'
                        }}>{e.role || 'user'}</span>
                      </td>
                      <td style={{ color: '#9a9a96' }}>{e.city || '—'}</td>
                      <td style={{ color: '#9a9a96' }}>{e.venueName || '—'}</td>
                      <td style={{ color: '#6b6b68', fontSize: '0.8rem' }}>{fmtDate(e.createdAt)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ChrgePlusAdmin />);
</script>
