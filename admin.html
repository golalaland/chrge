NOTE ON SECURITY: the Firestore rules suggested for the landing
page (allow create, deny read) will make this dashboard unable

  OPTION A (quick — only use while it's just you testing):
    Temporarily allow reads too:
      match /waitlist/{doc} {
        allow create: if true;
        allow read: if true;

    could then read the waitlist collection — fine for a
    private pilot, not once this is public-facing.

  OPTION B (correct long-term):
    Keep reads locked down, and instead view signups via the
    Firebase Console (console.firebase.google.com → your
    project → Firestore Database → waitlist), or put this
    admin page behind Firebase Auth so only you can log in

// ============================================================
// FIRESTORE FETCH
// ============================================================
async function fetchWaitlist() {
  if (!window.__chrgeFirebaseReady || !window.__chrgeFirestore) {
    throw new Error('firebase-unavailable');
  }
  const { db, collection, getDocs, query, orderBy } = window.__chrgeFirestore;
  const q = query(collection(db, 'waitlist'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

const fmtDate = (ts) => {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch {
    return '—';
  }
};

function StatCard({ label, value, icon: IconComp }) {
  return (
    <div style={{ background: '#131311', border: '1px solid rgba(244,244,242,0.08)', borderRadius: '14px', padding: '1.4rem 1.6rem', display: 'flex', alignItems: 'center', gap: '1rem', flex: 1 }}>
      <div style={{ width: '42px', height: '42px', borderRadius: '10px', background: 'rgba(195,246,12,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <IconComp size={19} color="#C3F60C" />
      </div>
      <div>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '1.5rem', color: '#F4F4F2', lineHeight: 1 }}>{value}</div>
        <div style={{ color: '#9a9a96', fontSize: '0.8rem', marginTop: '0.2rem' }}>{label}</div>
      </div>
    </div>
  );
}

function ChrgePlusAdmin() {
  const [entries, setEntries] = useState([]);
  const [status, setStatus] = useState('idle');
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const load = useCallback(async () => {
    setStatus('loading');
    try {
      const data = await fetchWaitlist();
      setEntries(data);
      setStatus('success');
    } catch (e) {
      setStatus('error');
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const filtered = entries.filter(e => {
    if (filter !== 'all' && e.role !== filter) return false;
    if (search.trim()) {
      const s = search.toLowerCase();
      return (e.name || '').toLowerCase().includes(s) ||
             (e.email || '').toLowerCase().includes(s) ||
             (e.city || '').toLowerCase().includes(s) ||
             (e.venueName || '').toLowerCase().includes(s);
    }
    return true;
  });

  const userCount = entries.filter(e => e.role === 'user').length;
  const venueCount = entries.filter(e => e.role === 'venue').length;

  const exportCsv = () => {
    const rows = [['Name', 'Email', 'Role', 'City', 'Venue', 'Joined']];
    filtered.forEach(e => {
      rows.push([e.name || '', e.email || '', e.role || '', e.city || '', e.venueName || '', fmtDate(e.createdAt)]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'chrge-plus-waitlist.csv';
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ background: '#0A0A0A', minHeight: '100vh', fontFamily: "'Inter', sans-serif", color: '#F4F4F2', padding: '2.5rem 1.5rem' }}>
      <div style={{ maxWidth: '1100px', margin: '0 auto' }}>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <ChrgeLogo style={{ width: '110px', marginBottom: '0.6rem' }} />
            <div style={{ color: '#9a9a96', fontSize: '0.85rem' }}>Waitlist dashboard</div>
          </div>
          <div style={{ display: 'flex', gap: '0.6rem' }}>
            <button onClick={load} disabled={status === 'loading'} style={{
              display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.7rem 1.1rem', borderRadius: '9px',
              border: '1px solid rgba(244,244,242,0.14)', background: 'transparent', color: '#F4F4F2',
              fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.85rem',
              cursor: status === 'loading' ? 'default' : 'pointer'
            }}>
              <Icon.RefreshCw size={15} style={{ animation: status === 'loading' ? 'spin 1s linear infinite' : 'none' }} />
              Refresh
            </button>
            <button onClick={exportCsv} disabled={filtered.length === 0} style={{
              display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.7rem 1.1rem', borderRadius: '9px', border: 'none',
              background: '#C3F60C', color: '#0A0A0A',
              fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '0.85rem',
              cursor: filtered.length === 0 ? 'default' : 'pointer',
              opacity: filtered.length === 0 ? 0.5 : 1
            }}>
              <Icon.Download size={15} />
              Export CSV
            </button>
          </div>
        </div>

        {status === 'error' && (
          <div style={{ display: 'flex', gap: '0.8rem', alignItems: 'flex-start', background: 'rgba(255,138,138,0.08)', border: '1px solid rgba(255,138,138,0.3)', borderRadius: '12px', padding: '1.2rem 1.4rem', marginBottom: '1.6rem' }}>
            <Icon.AlertCircle size={19} color="#ff8a8a" style={{ flexShrink: 0, marginTop: '2px' }} />
            <div>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.9rem', marginBottom: '0.3rem' }}>Couldn't load the waitlist</div>
              <div style={{ color: '#c9c9c5', fontSize: '0.83rem', lineHeight: 1.5 }}>
                Either the Firebase config near the top of this file is still set to placeholder values, or your Firestore rules don't allow reads yet. See the setup notes in the HTML comments — you'll likely need to temporarily allow reads on the <code>waitlist</code> collection, or view signups directly in the Firebase Console instead.
              </div>
            </div>
          </div>
        )}

        <div style={{ display: 'flex', gap: '1rem', marginBottom: '1.6rem', flexWrap: 'wrap' }}>
          <StatCard label="Total signups" value={entries.length} icon={Icon.Users} />
          <StatCard label="Users" value={userCount} icon={Icon.Users} />
          <StatCard label="Venues" value={venueCount} icon={Icon.Store} />
        </div>

        <div style={{ display: 'flex', gap: '0.8rem', marginBottom: '1.2rem', flexWrap: 'wrap' }}>
          <div style={{ position: 'relative', flex: 1, minWidth: '220px' }}>
            <Icon.Search size={15} color="#6b6b68" style={{ position: 'absolute', left: '0.9rem', top: '50%', transform: 'translateY(-50%)' }} />
            <input
              type="text" placeholder="Search name, email, city..." value={search}
              onChange={e => setSearch(e.target.value)}
              style={{ width: '100%', padding: '0.7rem 1rem 0.7rem 2.4rem', borderRadius: '9px', border: '1px solid rgba(244,244,242,0.12)', background: 'rgba(244,244,242,0.03)', color: '#F4F4F2', fontSize: '0.85rem', outline: 'none' }}
            />
          </div>
          <div style={{ display: 'flex', gap: '0.5rem' }}>
            {['all', 'user', 'venue'].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{
                padding: '0.7rem 1.1rem', borderRadius: '9px',
                border: filter === f ? '1px solid #C3F60C' : '1px solid rgba(244,244,242,0.12)',
                background: filter === f ? 'rgba(195,246,12,0.08)' : 'transparent',
                color: filter === f ? '#C3F60C' : '#9a9a96',
                fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.8rem',
                cursor: 'pointer', textTransform: 'capitalize'
              }}>{f}</button>
            ))}
          </div>
        </div>

        <div style={{ background: '#131311', border: '1px solid rgba(244,244,242,0.08)', borderRadius: '14px', overflow: 'hidden' }}>
          {status === 'loading' && entries.length === 0 ? (
            <div style={{ padding: '3rem', textAlign: 'center', color: '#6b6b68' }}>Loading signups…</div>
          ) : filtered.length === 0 && status !== 'error' ? (
            <div style={{ padding: '3rem', textAlign: 'center', color: '#6b6b68' }}>No signups {search || filter !== 'all' ? 'match this filter' : 'yet'}.</div>
          ) : status === 'error' ? null : (
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr><th>Name</th><th>Email</th><th>Role</th><th>City</th><th>Venue</th><th>Joined</th></tr>
                </thead>
                <tbody>
                  {filtered.map(e => (
                    <tr key={e.id}>
                      <td style={{ fontWeight: 500 }}>{e.name || '—'}</td>
                      <td style={{ color: '#c9c9c5' }}>{e.email}</td>
                      <td>
                        <span style={{
                          padding: '0.2rem 0.6rem', borderRadius: '999px', fontSize: '0.72rem',
                          fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600,
                          background: e.role === 'venue' ? 'rgba(195,246,12,0.12)' : 'rgba(244,244,242,0.08)',
                          color: e.role === 'venue' ? '#C3F60C' : '#c9c9c5'
                        }}>{e.role || 'user'}</span>
                      </td>
                      <td style={{ color: '#9a9a96' }}>{e.city || '—'}</td>
                      <td style={{ color: '#9a9a96' }}>{e.venueName || '—'}</td>
                      <td style={{ color: '#6b6b68', fontSize: '0.8rem' }}>{fmtDate(e.createdAt)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ChrgePlusAdmin />);
</script>
