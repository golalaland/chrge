// ============================================================
// SCROLL REVEAL HOOK
// ============================================================
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, className = '' }) {
  const [ref, visible] = useReveal();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? 'translateY(0)' : 'translateY(24px)',
        transition: `opacity 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}ms, transform 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}ms`
      }}
    >
      {children}
    </div>
  );
}

// ============================================================
function ChargeProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const scrolled = h.scrollTop;
      const height = h.scrollHeight - h.clientHeight;
      setPct(height > 0 ? Math.min(100, Math.round((scrolled / height) * 100)) : 0);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, height: '3px',
      background: 'rgba(244,244,242,0.08)', zIndex: 100
    }}>
      <div style={{
        height: '100%', width: `${pct}%`,
        background: '#C3F60C',
        boxShadow: '0 0 12px rgba(195,246,12,0.6)',
        transition: 'width 0.1s linear'
      }} />
    </div>
  );
}

// ============================================================
// TYPEWRITER (loops forever, initializes once, survives scroll)
// ------------------------------------------------------------
// Uses a ref (not state) to track typing phase/position so the
// animation loop lives entirely inside one useEffect that runs
// exactly once on mount ([] deps) — scrolling never re-triggers
// it since this component never unmounts (Reveal only toggles
// opacity/transform, it doesn't remove children from the DOM).
// ============================================================
function Typewriter({ messages, typingSpeed = 45, deletingSpeed = 25, pauseAfterType = 1400, pauseAfterDelete = 300 }) {
  const [text, setText] = useState('');
  const stateRef = useRef({ msgIndex: 0, charIndex: 0, phase: 'typing' });
  const timeoutRef = useRef(null);

  useEffect(() => {
    function step() {
      const s = stateRef.current;
      const current = messages[s.msgIndex];

      if (s.phase === 'typing') {
        s.charIndex++;
        setText(current.slice(0, s.charIndex));
        if (s.charIndex >= current.length) {
          s.phase = 'pausing';
          timeoutRef.current = setTimeout(step, pauseAfterType);
        } else {
          timeoutRef.current = setTimeout(step, typingSpeed);
        }
        return;
      }

      if (s.phase === 'pausing') {
        s.phase = 'deleting';
        timeoutRef.current = setTimeout(step, deletingSpeed);
        return;
      }

      if (s.phase === 'deleting') {
        s.charIndex--;
        setText(current.slice(0, Math.max(s.charIndex, 0)));
        if (s.charIndex <= 0) {
          s.msgIndex = (s.msgIndex + 1) % messages.length;
          s.phase = 'pausingBeforeNext';
          timeoutRef.current = setTimeout(step, pauseAfterDelete);
        } else {
          timeoutRef.current = setTimeout(step, deletingSpeed);
        }
        return;
      }

      if (s.phase === 'pausingBeforeNext') {
        s.phase = 'typing';
        timeoutRef.current = setTimeout(step, typingSpeed);
        return;
      }
    }

    timeoutRef.current = setTimeout(step, typingSpeed);
    return () => clearTimeout(timeoutRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  return (
    <span style={{ display: 'inline-flex', alignItems: 'center' }}>
      {text}
      <span aria-hidden="true" style={{
        display: 'inline-block', width: '2px', height: '0.9em', background: '#C3F60C',
        marginLeft: '2px', animation: 'chrgeCursorBlink 0.8s step-end infinite'
      }} />
    </span>
  );
}

// ============================================================
// CONFETTI — tasteful ~1s burst on waitlist success
// ------------------------------------------------------------
// Plain DOM elements (not canvas) animated via the
// chrgeConfettiFall keyframe defined in <style>. Contained
// within the success box itself (overflow:hidden host) rather
// than full-screen, keeping it a quick accent rather than a
// party effect.
// ============================================================
function fireChrgeConfetti(hostEl) {
  if (!hostEl) return;
  const colors = ['#C3F60C', '#e8ff8a', '#F4F4F2'];
  const count = 22;
  const originX = hostEl.clientWidth / 2;
  const originY = 44;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.5 - 0.25);
    const distance = 55 + Math.random() * 85;
    const cx = Math.cos(angle) * distance;
    const cy = Math.sin(angle) * distance - 15;
    const size = 4 + Math.random() * 5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const rotation = Math.round(Math.random() * 360);

    el.style.position = 'absolute';
    el.style.left = originX + 'px';
    el.style.top = originY + 'px';
    el.style.width = size + 'px';
    el.style.height = (size * (Math.random() > 0.5 ? 1 : 2.2)) + 'px';
    el.style.background = color;
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.setProperty('--cx', cx + 'px');
    el.style.setProperty('--cy', cy + 'px');
    el.style.setProperty('--cr', rotation + 'deg');
    el.style.animation = `chrgeConfettiFall ${0.7 + Math.random() * 0.4}s ease-out forwards`;
    el.style.pointerEvents = 'none';
    el.style.zIndex = '1';

    hostEl.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.remove(); }, 1300);
  }
}

// PRODUCT SLIDER
// ------------------------------------------------------------
// Infinite loop via the classic "clone edges" technique: real
// slides are padded with a clone of the last slide at the start
// and a clone of the first slide at the end, so sliding past
// either edge always has something to slide INTO — then once
// the transition finishes, we jump (without a transition) back
// to the real slide at the same visual position, invisibly.
//
// Placeholder slides below use the existing brand icon/gradient
// system rather than stock photography — swap `image: '...'` in
// with a real URL and this already applies loading="lazy".
// ============================================================
const CHRGE_PRODUCT_SLIDES = [
  { title: 'CHRGE+ 10,000mAh', subtitle: 'Slim power bank, USB-C + Lightning', icon: 'Zap', image: 'https://goll.b-cdn.net/assets/B1EB8519-5DA7-4D3A-AC39-C6C2E12CDF70.png' },

  { title: 'CHRGE+ Wall Charger', subtitle: '65W GaN, dual port', icon: 'Zap', image: 'https://https://goll.b-cdn.net/assets/B1EB8519-5DA7-4D3A-AC39-C6C2E12CDF70.png' },
  { title: 'CHRGE+ Station', subtitle: 'The kiosk itself, in the wild', icon: 'MapPin', image: 'https://goll.b-cdn.net/assets/F6C7DB0B-B35F-4A69-89A9-F100D046A829.png' },
  { title: 'CHRGE+ Car Mount', subtitle: 'Wireless charge, magnetic lock', icon: 'Zap', image: 'https://goll.b-cdn.net/assets/F6C7DB0B-B35F-4A69-89A9-F100D046A829.png' }
];


function ProductSlider() {
  const slides = CHRGE_PRODUCT_SLIDES;
  const extended = [slides[slides.length - 1], ...slides, slides[0]];
  const [index, setIndex] = useState(1);
  const [withTransition, setWithTransition] = useState(true);
  const [paused, setPaused] = useState(false);
  const dragState = useRef({ dragging: false, startX: 0, deltaX: 0 });
  const [dragOffsetPx, setDragOffsetPx] = useState(0);
  const trackRef = useRef(null);
  const containerRef = useRef(null);
  const autoplayRef = useRef(null);

  const goTo = (newIndex, transition = true) => {
    setWithTransition(transition);
    setIndex(newIndex);
  };

  useEffect(() => {
    if (paused) return;
    autoplayRef.current = setInterval(() => {
      setDragOffsetPx(0);
      goTo(index + 1, true);
    }, 4200);
    return () => clearInterval(autoplayRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [index, paused]);

  const handleTransitionEnd = () => {
    if (index === extended.length - 1) {
      goTo(1, false);
    } else if (index === 0) {
      goTo(extended.length - 2, false);
    }
  };

  const onPointerDown = (e) => {
    dragState.current = { dragging: true, startX: e.clientX, deltaX: 0 };
    setPaused(true);
    if (containerRef.current) containerRef.current.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragState.current.dragging) return;
    dragState.current.deltaX = e.clientX - dragState.current.startX;
    setDragOffsetPx(dragState.current.deltaX);
  };
  const onPointerUp = () => {
    if (!dragState.current.dragging) return;
    const delta = dragState.current.deltaX;
    const threshold = 60;
    setDragOffsetPx(0);
    if (delta > threshold) {
      goTo(index - 1, true);
    } else if (delta < -threshold) {
      goTo(index + 1, true);
    } else {
      setWithTransition(true);
    }
    dragState.current = { dragging: false, startX: 0, deltaX: 0 };
    setPaused(false);
  };

  const baseTranslate = -index * 100;
  const dragPct = containerRef.current && containerRef.current.clientWidth
    ? (dragOffsetPx / containerRef.current.clientWidth) * 100
    : 0;

  return (
    <div
      ref={containerRef}
      onMouseEnter={() => setPaused(true)}
      onMouseLeave={() => setPaused(false)}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
      style={{ position: 'relative', overflow: 'hidden', borderRadius: '18px', touchAction: 'pan-y', cursor: 'grab', userSelect: 'none' }}
    >
      <div
        ref={trackRef}
        className="chrge-slider-track"
        onTransitionEnd={handleTransitionEnd}
        style={{
          display: 'flex',
          transform: `translateX(calc(${baseTranslate}% + ${dragPct}%))`,
          transition: withTransition ? 'transform 0.5s cubic-bezier(0.65,0,0.35,1)' : 'none'
        }}
      >
        {extended.map((slide, i) => (
          <div key={i} style={{ flex: '0 0 100%', maxWidth: '100%' }}>
            <div style={{
              margin: '0 0.5rem',
              background: 'linear-gradient(155deg, #1a1a17 0%, #0d0d0b 100%)',
              border: '1px solid rgba(244,244,242,0.08)',
              borderRadius: '16px',
              aspectRatio: '16 / 9',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              gap: '1rem', padding: '2rem'
            }}>
              {slide.image ? (
                <img src={slide.image} alt={slide.title} loading="lazy" draggable="false"
                  style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '16px' }} />
              ) : (
                <>
                  <div style={{
                    width: '56px', height: '56px', borderRadius: '14px',
                    background: 'rgba(195,246,12,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center'
                  }}>
                    {Icon[slide.icon] ? Icon[slide.icon]({ size: 26, color: '#C3F60C' }) : null}
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '1.05rem', color: '#F4F4F2', marginBottom: '0.3rem' }}>{slide.title}</div>
                    <div style={{ fontSize: '0.82rem', color: '#6b6b68' }}>{slide.subtitle}</div>
                  </div>
                </>
              )}
            </div>
          </div>
        ))}
      </div>

      <div style={{ display: 'flex', justifyContent: 'center', gap: '0.4rem', marginTop: '1rem' }}>
        {slides.map((_, i) => {
          const realIndex = i + 1;
          const isActive = index === realIndex || (index === 0 && i === slides.length - 1) || (index === extended.length - 1 && i === 0);
          return (
            <button
              key={i}
              type="button"
              aria-label={`Go to slide ${i + 1}`}
              onClick={() => { setDragOffsetPx(0); goTo(realIndex, true); }}
              style={{
                width: isActive ? '18px' : '6px', height: '6px', borderRadius: '999px',
                background: isActive ? '#C3F60C' : 'rgba(244,244,242,0.2)',
                border: 'none', cursor: 'pointer', transition: 'all 0.25s ease', padding: 0
              }}
            />
          );
        })}
      </div>
    </div>
  );
}

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.2rem' }}>
                  <ChrgeLogo style={{ width: '64px' }} />
                  <Icon.Zap size={16} color="#C3F60C" fill="#C3F60C" />
                </div>
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: '0.9rem' }}>
                  <div style={{ background: 'rgba(195,246,12,0.08)', border: '1px solid rgba(195,246,12,0.25)', borderRadius: '12px', padding: '0.9rem' }}>

                      <Icon.Plus size={34} color="#0A0A0A" strokeWidth={3} />
                    </div>
                  </div>
                  <div style={{ textAlign: 'center', fontSize: '0.8rem', color: '#9a9a96', fontFamily: "'Space Grotesk', sans-serif" }}>Tap to unlock</div>
                </div>
              </div>
            </div>
          </Reveal>

            <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 'clamp(1.7rem, 3vw, 2.3rem)', lineHeight: 1.15 }}>Charging shouldn't need a plan.</h2>
          </div>
        </Reveal>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '1.4rem' }} className="how-grid">
          {[
            { icon: Icon.MapPin, title: 'Find a station', desc: 'Open the app, see every CHRGE+ station near you in real time — cafes, malls, gyms, wherever you already are.' },
            { icon: Icon.ScanLine, title: 'Scan and go', desc: "Tap to unlock a fully-charged power bank. No deposit drama, no app-store dead ends. Just scan." },
            { icon: Icon.Wallet, title: 'Return anywhere', desc: "Drop it back at any station in the network when you're done — not just the one you took it from." }
          ].map((step, i) => (

                <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '1.15rem', marginBottom: '0.5rem' }}>{step.title}</h3>
                <p style={{ color: '#9a9a96', fontSize: '0.92rem', lineHeight: 1.55 }}>{step.desc}</p>
              </div>

          <ProductSlider />

      </section>

      <section style={{ background: '#F4F4F2', padding: '5rem 1.5rem' }}>
        <div style={{ maxWidth: '1160px', margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '3rem', alignItems: 'center' }} className="venue-grid">
          <Reveal>
            <div>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: '0.78rem', fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#7a9b00', marginBottom: '0.8rem' }}>For venues</div>
              <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 'clamp(1.6rem, 3vw, 2.1rem)', color: '#0A0A0A', lineHeight: 1.18, marginBottom: '1rem' }}>Run a cafe, bar, gym, or lounge? Host a station for free.</h2>
              <p style={{ color: '#5a5a56', fontSize: '1rem', lineHeight: 1.6, marginBottom: '1.6rem', maxWidth: '440px' }}>Zero cost to install, zero upkeep on your end — and you earn a cut of every rental made at your location.</p>
              <button onClick={scrollToWaitlist} style={{
                padding: '0.9rem 1.6rem', borderRadius: '10px', border: 'none', background: '#0A0A0A', color: '#C3F60C',
                fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '0.9rem',
                cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '0.5rem'
              }}>Apply as a venue <Icon.ArrowRight size={16} /></button>
            </div>
          </Reveal>
          <Reveal delay={120}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.9rem' }}>
              {[['$0', 'cost or upkeep to host a station'], ['24/7', 'stations charge people around the clock'], ['+1', 'amenity your customers remember you for']].map(([stat, label], i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '1.1rem', background: '#FFFFFF', border: '1px solid rgba(10,10,10,0.08)', borderRadius: '12px', padding: '1.1rem 1.4rem' }}>
                  <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '1.5rem', color: '#0A0A0A', minWidth: '64px' }}>{stat}</div>
                  <div style={{ color: '#6b6b68', fontSize: '0.88rem' }}>{label}</div>
                </div>
              ))}
            </div>
          </Reveal>
        </div>
      </section>

      {/* PRODUCT TEASER */}
      <section style={{ padding: '4.5rem 1.5rem', maxWidth: '1160px', margin: '0 auto' }}>
        <Reveal>
          <div style={{ display: 'flex', alignItems: 'center', gap: '1.6rem', background: '#131311', border: '1px solid rgba(244,244,242,0.08)', borderLeft: '3px solid #C3F60C', borderRadius: '14px', padding: '1.8rem 2rem', flexWrap: 'wrap' }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '2rem', color: '#C3F60C' }}>+1</div>
            <div style={{ flex: 1, minWidth: '260px' }}>
              <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, fontSize: '1.05rem', marginBottom: '0.3rem' }}>Also stocking chargers, cables & power banks</h3>
              <p style={{ color: '#9a9a96', fontSize: '0.88rem', lineHeight: 1.5 }}>Own your gear instead of renting? The CHRGE+ shop is landing soon — quality-tested, no counterfeit cells.</p>
            </div>
          </div>
        </Reveal>
      </section>

      {/* WAITLIST */}
      <section id="waitlist" style={{ padding: '5rem 1.5rem 7rem' }}>
        <div style={{ maxWidth: '480px', margin: '0 auto' }}>
          <Reveal>
            <div style={{ textAlign: 'center', marginBottom: '2.2rem' }}>
              <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 'clamp(1.7rem, 3vw, 2.2rem)', marginBottom: '0.6rem' }}>
                Charge right. <span style={{ color: '#C3F60C' }}>Get on the list.</span>
              </h2>
              <p style={{ color: '#9a9a96', fontSize: '0.95rem' }}>Be first to know when CHRGE+ lands in your city.</p>
            </div>
          </Reveal>
          <Reveal delay={100}>
            <div style={{ background: '#131311', border: '1px solid rgba(244,244,242,0.08)', borderRadius: '18px', padding: '2rem' }}>
              <WaitlistForm />
            </div>
          </Reveal>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{ borderTop: '1px solid rgba(244,244,242,0.08)', padding: '2.5rem 1.5rem' }}>
        <div style={{ maxWidth: '1160px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
          <ChrgeLogo style={{ width: '90px' }} fill="#6b6b68" />
          <p style={{ color: '#6b6b68', fontSize: '0.8rem', fontFamily: "'Space Grotesk', sans-serif" }}>© 2026 CHRGE+. Power, wherever.</p>
        </div>
      </footer>
    </div>
  );
}

root.render(<ChrgePlusLanding />);
